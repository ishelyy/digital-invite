<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>A DAY of LOVE & JOY!</title>
    <!-- Link to a beautiful Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .invitation-text {
            font-family: 'Pacifico', cursive; /* Elegant font from Google Fonts */
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .video-container {
            width: 90%;
            max-width: 1000px;
            text-align: center;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            outline: none;
        }

        h1 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Style for the link */
        #volume-link {
            color: #00f;
            cursor: pointer;
            text-decoration: underline;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- Invitation Text -->
    <div class="invitation-text">
        Join Us for a Beautiful Day of Love & Joy!
    </div>

    <h1>A DAY of LOVE & JOY!</h1>

    <!-- Your video -->
    <div class="video-container">       
        <video id="myVideo" controls autoplay muted playsinline>
            <source src="A DAY of LOVE & JOY!.mp4" type="video/mp4" />
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Autoplay music -->
    <audio id="myAudio" autoplay loop>
        <source src="your-music-file.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
    </audio>

    <!-- Link to set volume to 100% -->
    <p>
        <a id="volume-link" href="#">Set Volume to 100%</a>
    </p>

    <script>
        document.getElementById('volume-link').addEventListener('click', function(e) {
            e.preventDefault(); // Prevent link from navigating
            var audio = document.getElementById('myAudio');
            audio.volume = 1; // Set volume to 100%
        });
    </script>

</body>
</html>
